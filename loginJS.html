<script>
let currentPin = '';
const maxPinLength = 4;
const dots = document.querySelectorAll('.pin-dot');
const errorMsg = document.getElementById('errorMessage');
const btnSubmit = document.getElementById('btnSubmit');
const submitIcon = document.getElementById('submitIcon');
const loadingSpinner = document.getElementById('loadingSpinner');

function updateDots() {
    dots.forEach((dot, index) => {
        if (index < currentPin.length) {
            dot.classList.add('filled');
        } else {
            dot.classList.remove('filled');
        }
    });
}

function addPin(num) {
    if (currentPin.length < maxPinLength) {
        currentPin += num;
        updateDots();
        errorMsg.textContent = '';
        if(currentPin.length === maxPinLength) {
            submitPin();
        }
    }
}

function clearPin() {
    currentPin = '';
    updateDots();
    errorMsg.textContent = '';
}

function setLoading(isLoading) {
    if (isLoading) {
        submitIcon.style.display = 'none';
        loadingSpinner.style.display = 'inline-block';
        btnSubmit.disabled = true;
    } else {
        submitIcon.style.display = 'inline-block';
        loadingSpinner.style.display = 'none';
        btnSubmit.disabled = false;
    }
}

function submitPin() {
    if (currentPin.length === 0) return;
    
    setLoading(true);
    errorMsg.textContent = '';
    
    // 🚀 LÓGICA DE LOGIN SPA DIRECTO CON SUPABASE AUTH
    let authEmail = "";
    let authPass = "";
    
    // Mapeo interno para no cambiar la experiencia UX de 4 dígitos
    if (currentPin === "1234") {
        authEmail = "desarrollador@gloss.com";
        authPass = "gloss123456";
    } else {
        authEmail = "recepcion@gloss.com";
        authPass = "gloss" + currentPin; // Ej: gloss5678
    }

    // Usamos el cliente global de Supabase cargado en recepcionDashboard
    window.supabaseClient.auth.signInWithPassword({
        email: authEmail,
        password: authPass
    }).then(({ data, error }) => {
        if (error) {
            setLoading(false);
            errorMsg.textContent = "PIN incorrecto o usuario no registrado.";
            console.error("Auth Error:", error.message);
            // Limpiar PIN visualmente
            clearPin();
        } else {
            console.log("CLIENT DEBUG: Autenticado directamente con Supabase Auth.");
            
            // Extraer nombre (temporalmente estático hasta migrar roles)
            const nombreUser = (authEmail === "desarrollador@gloss.com") ? "Cristian" : "Recepción";
            sessionStorage.setItem("userName", nombreUser);
            sessionStorage.setItem("userToken", data.session.access_token);
            
            // Transición limpia de SPA
            setLoading(false);
            const loginWall = document.getElementById('loginWall');
            const appWall = document.getElementById('appWall');
            if(loginWall) loginWall.style.display = 'none';
            if(appWall) appWall.style.display = 'block';
            
            // Disparar carga del dashboard principal
            if (typeof inicializarDashboardTotal === 'function') {
                inicializarDashboardTotal();
            }
        }
    });
}
</script>
