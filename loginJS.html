<script>
console.error("💥 INICIANDO SCRIPT DE LOGIN SPA (VERSIÓN FETCH NATIVO) 💥");

let currentPin = '';
const maxPinLength = 4;
const dots = document.querySelectorAll('.pin-dot');
const errorMsg = document.getElementById('errorMessage');
const btnSubmit = document.getElementById('btnSubmit');
const submitIcon = document.getElementById('submitIcon');
const loadingSpinner = document.getElementById('loadingSpinner');

function updateDots() {
    dots.forEach((dot, index) => {
        if (index < currentPin.length) {
            dot.classList.add('filled');
        } else {
            dot.classList.remove('filled');
        }
    });
}

function addPin(num) {
    if (currentPin.length < maxPinLength) {
        currentPin += num;
        updateDots();
        errorMsg.textContent = '';
        if(currentPin.length === maxPinLength) {
            submitPin();
        }
    }
}

function clearPin() {
    currentPin = '';
    updateDots();
    errorMsg.textContent = '';
}

function setLoading(isLoading) {
    if (isLoading) {
        submitIcon.style.display = 'none';
        loadingSpinner.style.display = 'inline-block';
        btnSubmit.disabled = true;
    } else {
        submitIcon.style.display = 'inline-block';
        loadingSpinner.style.display = 'none';
        btnSubmit.disabled = false;
    }
}

async function submitPin() {
    if (currentPin.length === 0) return;
    
    setLoading(true);
    errorMsg.textContent = '';
    
    let authEmail = "";
    let authPass = "";
    
    // Mapeo interno para no cambiar la UX de 4 dígitos
    if (currentPin === "1234") {
        authEmail = "desarrollador@gloss.com";
        authPass = "gloss123456";
    } else {
        authEmail = "recepcion@gloss.com";
        authPass = "gloss" + currentPin; 
    }

    // Leer variables inyectadas en el HTML principal (seguro contra Sandbox)
    const configDiv = document.getElementById('supabase-config');
    const supaUrl = configDiv ? configDiv.dataset.url : null;
    const supaKey = configDiv ? configDiv.dataset.key : null;

    if (!supaUrl || !supaKey) {
        setLoading(false);
        errorMsg.textContent = "Error interno: Faltan credenciales de conexión.";
        console.error("CRÍTICO: SUPABASE_URL o SUPABASE_KEY no definidos.");
        return;
    }

    try {
        console.log("CLIENT DEBUG: Autenticando mediante REST API (Fetch)...");
        const response = await fetch(`${supaUrl}/auth/v1/token?grant_type=password`, {
            method: 'POST',
            headers: {
                'apikey': supaKey,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                email: authEmail,
                password: authPass
            })
        });

        const data = await response.json();

        if (!response.ok) {
            setLoading(false);
            errorMsg.textContent = "PIN incorrecto o usuario no registrado.";
            console.error("Auth Error (Fetch):", data.error_description || data.msg);
            clearPin();
        } else {
            console.log("CLIENT DEBUG: Autenticado exitosamente con Fetch API.");
            
            const nombreUser = (authEmail === "desarrollador@gloss.com") ? "Cristian" : "Recepción";
            sessionStorage.setItem("userName", nombreUser);
            sessionStorage.setItem("userToken", data.access_token);
            
            setLoading(false);
            const loginWall = document.getElementById('loginWall');
            const appWall = document.getElementById('appWall');
            if(loginWall) loginWall.style.display = 'none';
            if(appWall) appWall.style.display = 'block';
            
            if (typeof inicializarDashboardTotal === 'function') {
                inicializarDashboardTotal();
            }
        }
    } catch (err) {
        setLoading(false);
        errorMsg.textContent = "Error de red al conectar al servidor central.";
        console.error("Fetch Exception:", err);
    }
}
</script>
